<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepPilot • Applications</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">PP</div>
        <div>
          <p class="brand-title">PrepPilot</p>
          <span>Placement planner</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="tracker.html">DSA Tracker</a>
        <a class="nav-link active" href="applications.html">Applications</a>
        <a class="nav-link" href="interviews.html">Interviews</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </nav>
      <div class="sidebar-footer">
        <div class="badge-pill">Pipeline tracker</div>
        <button class="logout-button" id="logoutButton">Logout</button>
      </div>
    </aside>
    <main class="dashboard-main">
      <header class="topbar">
        <div>
          <span class="eyebrow-pill">Application pipeline</span>
          <h1>Track every placement application.</h1>
          <p>Monitor company progress, interview stages, and application updates in a placement-ready workspace.</p>
        </div>
      </header>
      <section class="panel">
        <div class="panel-header">
          <div>
            <span class="eyebrow-pill">Kanban board</span>
            <h2>Active applications</h2>
          </div>
          <button class="secondary-button" id="newApplicationToggle">New application</button>
        </div>
        <form id="applicationForm" class="form-card board-form hidden">
          <label>
            Company
            <input id="companyName" type="text" name="companyName" required placeholder="Amazon" autocomplete="organization" />
          </label>
          <label>
            Role
            <input id="roleName" type="text" name="role" required placeholder="SDE Intern" autocomplete="organization-title" />
          </label>
          <label>
            Package
            <input id="package" type="text" name="package" placeholder="12 LPA" autocomplete="off" />
          </label>
          <label>
            Application date
            <input id="applicationDate" type="date" name="applicationDate" required autocomplete="off" />
          </label>
          <label>
            Status
            <select id="applicationStatus" name="status" required>
              <option value="Applied">Applied</option>
              <option value="OA">OA</option>
              <option value="Interview">Interview</option>
              <option value="HR">HR</option>
              <option value="Selected">Selected</option>
              <option value="Rejected">Rejected</option>
            </select>
          </label>
          <button type="submit" class="primary-button">Add application</button>
        </form>
      </section>
      <section class="kanban-board" id="applicationsBoard"></section>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/applications.js"></script>
</body>
</html>
