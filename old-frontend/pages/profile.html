<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepPilot • Profile</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <div class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">PP</div>
        <div>
          <p class="brand-title">PrepPilot</p>
          <span>Profile center</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="tracker.html">DSA Tracker</a>
        <a class="nav-link" href="applications.html">Applications</a>
        <a class="nav-link" href="interviews.html">Interviews</a>
        <a class="nav-link active" href="profile.html">Profile</a>
      </nav>
      <div class="sidebar-footer">
        <div class="badge-pill">Account details</div>
        <button class="logout-button" id="logoutButton">Logout</button>
      </div>
    </aside>
    <main class="dashboard-main">
      <header class="topbar">
        <div>
          <span class="eyebrow-pill">Student profile</span>
          <h1>Your placement-ready summary</h1>
          <p>Edit your profile and keep your academic information up to date for better planning.</p>
        </div>
      </header>
      <section class="panel profile-panel">
        <div class="panel-header">
          <div>
            <span class="eyebrow-pill">Personal details</span>
            <h2>Manage your candidate profile</h2>
          </div>
        </div>
        <form id="profileForm" class="profile-form">
          <label>
            Full Name
            <input id="profileName" name="fullName" type="text" required />
          </label>
          <label>
            Email
            <input id="profileEmail" name="email" type="email" disabled />
          </label>
          <label>
            College
            <input id="profileCollege" name="college" type="text" required />
          </label>
          <label>
            Graduation Year
            <input id="profileGradYear" name="graduationYear" type="number" required />
          </label>
          <div class="form-row">
            <span class="muted" id="profileJoined"></span>
          </div>
          <button type="submit" class="primary-button">Save profile</button>
          <div class="muted" id="profileMessage"></div>
        </form>
      </section>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
